<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#07060f" />
    <link rel="icon" href="data:,">
    <title>Yokai Jump</title>
    <style>
      /* Self-hosted so the game keeps its typography offline and inside Capacitor. */
      @font-face {
        font-family: "Yuji Boku";
        src: url("assets/fonts/YujiBoku-400.woff2") format("woff2");
        font-weight: 400;
        font-display: block;
      }
      @font-face {
        font-family: "Rajdhani";
        src: url("assets/fonts/Rajdhani-500.woff2") format("woff2");
        font-weight: 500;
        font-display: block;
      }
      @font-face {
        font-family: "Rajdhani";
        src: url("assets/fonts/Rajdhani-600.woff2") format("woff2");
        font-weight: 600;
        font-display: block;
      }
      @font-face {
        font-family: "Rajdhani";
        src: url("assets/fonts/Rajdhani-700.woff2") format("woff2");
        font-weight: 700;
        font-display: block;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: #07060f;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        /* Art is painted supersampled and downscaled — smooth filtering, not pixelated. */
        background:
          radial-gradient(ellipse at 50% 0%, #1c1836 0%, #07060f 70%);
      }

      /* Keeps the fonts resident before Phaser measures any text. */
      #font-preload {
        position: absolute;
        left: -9999px;
        top: -9999px;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="font-preload" aria-hidden="true">
      <span style="font-family: 'Yuji Boku'; font-weight: 400">.</span>
      <span style="font-family: 'Rajdhani'; font-weight: 500">.</span>
      <span style="font-family: 'Rajdhani'; font-weight: 600">.</span>
      <span style="font-family: 'Rajdhani'; font-weight: 700">.</span>
    </div>
    <!-- HtmlWebpackPlugin injects the compiled bundle here. -->
  </body>
</html>
